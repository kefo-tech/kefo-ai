<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KeFo AI Entity</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app" id="app">
    <canvas id="bgCanvas"></canvas>
    <canvas id="faceCanvas"></canvas>
    <canvas id="fxCanvas"></canvas>

    <main class="ui-layer">
      <section class="status-bar">
        <div class="status-pill">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">جاهز</span>
        </div>

        <button class="icon-btn sound-btn is-on" id="soundBtn" type="button" aria-label="الصوت">
          <span id="soundIcon">🔊</span>
        </button>
      </section>

      <section class="transcript-panel" id="transcriptPanel">
        <div class="transcript-head">
          <button class="ghost-btn" id="toggleTranscriptBtn" type="button">إخفاء النص</button>
          <button class="ghost-btn" id="clearBtn" type="button">مسح</button>
        </div>

        <div class="transcript" id="transcript" aria-live="polite"></div>

        <div class="composer">
          <button class="circle-btn mic-btn" id="micBtn" type="button" aria-label="الميكروفون">
            <span>🎤</span>
          </button>

          <div class="input-shell">
            <textarea
              id="promptInput"
              rows="1"
              placeholder="اكتب سؤالك..."
              enterkeyhint="send"
            ></textarea>
          </div>

          <button class="circle-btn send-btn" id="sendBtn" type="button" aria-label="إرسال">
            <span>➜</span>
          </button>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
