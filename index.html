<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KeFo AI — Future HUD</title>

  <style>
    :root{
      --bg:#02030a;
      --bg2:#07111f;
      --cyan:#00eaff;
      --cyan2:#00b7ff;
      --green:#00ff9c;
      --danger:#ff4d4d;
      --danger2:#ff1f1f;
      --text:#d8fdff;
      --muted:#7ee7f0;
      --glass:rgba(0,255,255,0.06);
      --glass-2:rgba(0,255,255,0.03);
      --line:rgba(0,255,255,0.22);
      --line-strong:rgba(0,255,255,0.4);
      --shadow:0 0 20px rgba(0,234,255,.16);
      --radius:16px;
      --topbar-h:74px;
      --inputbar-h:88px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    html, body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
    }

    body{
      font-family:"Segoe UI", Tahoma, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(1100px 700px at 50% -10%, #0b2744 0%, var(--bg) 58%),
        linear-gradient(180deg, #010207, #040812);
      user-select:none;
      -webkit-user-select:none;
      -ms-user-select:none;
      touch-action:manipulation;
      transition: background .35s ease, filter .35s ease;
    }

    body.security-alert{
      background:
        radial-gradient(1000px 700px at 50% -10%, #4a0c0c 0%, #1a0303 58%),
        linear-gradient(180deg, #120202, #220606);
      animation: dangerPulse .28s ease-in-out 8 alternate;
      filter: saturate(1.15);
    }

    @keyframes dangerPulse{
      from{ box-shadow: inset 0 0 0 9999px rgba(255,0,0,.04); }
      to{ box-shadow: inset 0 0 0 9999px rgba(255,0,0,.12); }
    }

    .bg-grid{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(0,234,255,.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,234,255,.055) 1px, transparent 1px);
      background-size:36px 36px;
      mask-image:radial-gradient(circle at center, black 58%, transparent 100%);
      transition: opacity .35s ease, filter .35s ease;
    }

    body.security-alert .bg-grid{
      filter:hue-rotate(-120deg) saturate(1.6);
      opacity:.9;
    }

    .scan{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      background:linear-gradient(transparent 0%, rgba(0,234,255,.06) 48%, rgba(0,234,255,.11) 50%, transparent 100%);
      background-size:100% 8px;
      animation:scanMove 8s linear infinite;
      mix-blend-mode:screen;
      opacity:.7;
      transition: filter .35s ease;
    }

    body.security-alert .scan{
      filter:hue-rotate(-145deg) saturate(1.8);
    }

    @keyframes scanMove{
      0%{ background-position:0 -120vh; }
      100%{ background-position:0 120vh; }
    }

    .noise{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      opacity:.05;
      background-image:url('data:image/svg+xml;utf8,\
      <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120">\
      <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/></filter>\
      <rect width="100%" height="100%" filter="url(%23n)" opacity="0.5"/></svg>');
    }

    .app{
      position:relative;
      z-index:1;
      width:min(1200px, 100%);
      height:100dvh;
      margin:0 auto;
      display:grid;
      grid-template-rows: var(--topbar-h) 1fr var(--inputbar-h);
      gap:10px;
      padding:10px;
      overflow:hidden;
    }

    .topbar{
      min-height:var(--topbar-h);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:12px 16px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(0,255,255,.07), rgba(0,0,0,.25));
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow), inset 0 0 24px rgba(0,234,255,.07);
      overflow:hidden;
      transition: border-color .35s ease, box-shadow .35s ease, background .35s ease;
    }

    body.security-alert .topbar,
    body.security-alert .main,
    body.security-alert .inputbar,
    body.security-alert .card,
    body.security-alert .bubble{
      border-color: rgba(255,70,70,.45) !important;
      box-shadow: 0 0 24px rgba(255,50,50,.15), inset 0 0 22px rgba(255,50,50,.04) !important;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .logo{
      width:42px;
      height:42px;
      border-radius:50%;
      background:radial-gradient(circle, var(--cyan), #00131f 70%);
      box-shadow:0 0 24px var(--cyan), inset 0 0 16px rgba(255,255,255,.2);
      flex:0 0 auto;
      transition: background .35s ease, box-shadow .35s ease;
    }

    body.security-alert .logo,
    body.security-alert .core{
      background:radial-gradient(circle, #ff4d4d, #280505 72%) !important;
      box-shadow:0 0 24px #ff4d4d, 0 0 56px rgba(255,40,40,.28), inset 0 0 16px rgba(255,255,255,.12) !important;
    }

    .brand-text{
      min-width:0;
    }

    .brand-text h1{
      margin:0;
      font-size:18px;
      color:var(--cyan);
      text-shadow:0 0 12px rgba(0,234,255,.5);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      transition: color .35s ease, text-shadow .35s ease;
    }

    body.security-alert .brand-text h1,
    body.security-alert .card-title,
    body.security-alert .hero-label{
      color:#ff9d9d !important;
      text-shadow:0 0 12px rgba(255,70,70,.45) !important;
    }

    .brand-text .sub{
      font-size:12px;
      color:var(--muted);
      opacity:.9;
      margin-top:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      transition: color .35s ease;
    }

    body.security-alert .brand-text .sub,
    body.security-alert .sys,
    body.security-alert .badge{
      color:#ffc7c7 !important;
    }

    .sys{
      display:flex;
      align-items:center;
      gap:12px;
      font-size:12px;
      color:var(--muted);
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border:1px solid var(--line);
      border-radius:999px;
      background:rgba(0,255,255,.04);
      max-width:260px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      transition: border-color .35s ease, background .35s ease;
    }

    body.security-alert .status-pill{
      border-color: rgba(255,70,70,.4);
      background: rgba(255,50,50,.06);
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 10px var(--green);
      flex:0 0 auto;
      transition: background .35s ease, box-shadow .35s ease;
    }

    body.security-alert .dot{
      background:#ff5a5a;
      box-shadow:0 0 10px #ff5a5a;
    }

    .main{
      position:relative;
      min-height:0;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(0,255,255,.04), rgba(0,0,0,.28));
      backdrop-filter:blur(8px);
      box-shadow:var(--shadow), inset 0 0 24px rgba(0,234,255,.06);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      transition: background .35s ease;
    }

    .hero{
      position:relative;
      flex:0 0 210px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-bottom:1px solid rgba(0,255,255,.08);
      overflow:hidden;
    }

    .hero::before,
    .hero::after{
      content:"";
      position:absolute;
      width:300px;
      height:300px;
      border-radius:50%;
      border:1px dashed rgba(0,234,255,.14);
      animation:spin 18s linear infinite;
      transition: border-color .35s ease;
    }

    .hero::after{
      width:220px;
      height:220px;
      animation-duration:11s;
      animation-direction:reverse;
    }

    body.security-alert .hero::before,
    body.security-alert .hero::after,
    body.security-alert .ring{
      border-color: rgba(255,70,70,.22) !important;
    }

    @keyframes spin{
      to{ transform:rotate(360deg); }
    }

    .core-cluster{
      position:relative;
      width:170px;
      height:170px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .ring{
      position:absolute;
      border-radius:50%;
      border:1px solid rgba(0,234,255,.18);
      animation:spin 18s linear infinite;
      transition: border-color .35s ease;
    }

    .ring.r1{ inset:0; }
    .ring.r2{ inset:18px; animation-duration:12s; animation-direction:reverse; }
    .ring.r3{ inset:36px; animation-duration:8s; }

    .core{
      width:84px;
      height:84px;
      border-radius:50%;
      background:radial-gradient(circle, var(--cyan), #00131f 68%);
      box-shadow:
        0 0 28px var(--cyan),
        0 0 58px rgba(0,234,255,.45),
        inset 0 0 18px rgba(255,255,255,.18);
      transition:.22s ease;
    }

    .core.thinking{
      background:radial-gradient(circle, var(--green), #00140a 70%);
      box-shadow:
        0 0 26px var(--green),
        0 0 54px rgba(0,255,156,.38),
        inset 0 0 18px rgba(255,255,255,.12);
    }

    .core.speaking{
      animation:pulse 1s ease-in-out infinite;
    }

    @keyframes pulse{
      0%,100%{ transform:scale(1); }
      50%{ transform:scale(1.18); }
    }

    .hero-label{
      position:absolute;
      bottom:16px;
      left:50%;
      transform:translateX(-50%);
      font-size:12px;
      color:var(--muted);
      letter-spacing:2px;
      text-transform:uppercase;
      opacity:.9;
      text-align:center;
      white-space:nowrap;
      transition: color .35s ease;
    }

    .chat{
      flex:1 1 auto;
      min-height:0;
      overflow:auto;
      padding:18px 18px 28px;
      scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain;
    }

    .chat::-webkit-scrollbar{
      width:8px;
    }

    .chat::-webkit-scrollbar-thumb{
      background:rgba(0,234,255,.24);
      border-radius:999px;
    }

    .msg{
      margin:0 0 14px;
      display:flex;
      width:100%;
    }

    .msg.user{
      justify-content:flex-start;
    }

    .msg.ai{
      justify-content:flex-end;
    }

    .bubble{
      max-width:min(92%, 880px);
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius:14px;
      background:rgba(0,255,255,.045);
      color:var(--text);
      line-height:1.8;
      box-shadow:inset 0 0 16px rgba(0,234,255,.03);
      word-break:break-word;
      transition: background .35s ease, border-color .35s ease;
    }

    .msg.user .bubble{
      border-color:rgba(0,255,156,.2);
      background:rgba(0,255,156,.06);
      color:#c9ffe1;
    }

    body.security-alert .msg.user .bubble{
      border-color:rgba(255,90,90,.22) !important;
      background:rgba(255,70,70,.08) !important;
      color:#ffe3e3 !important;
    }

    .card{
      width:min(100%, 930px);
      margin:0 0 18px auto;
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(0,255,255,.07), rgba(0,0,0,.34));
      backdrop-filter:blur(10px);
      box-shadow:
        0 0 22px rgba(0,234,255,.14),
        inset 0 0 22px rgba(0,234,255,.05);
      transition: background .35s ease;
    }

    body.security-alert .card{
      background:
        linear-gradient(180deg, rgba(255,70,70,.08), rgba(0,0,0,.34));
    }

    .card-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:12px 14px;
      border-bottom:1px dashed rgba(0,234,255,.16);
      background:rgba(0,255,255,.03);
      transition: border-color .35s ease, background .35s ease;
    }

    body.security-alert .card-head{
      border-bottom-color: rgba(255,70,70,.16);
      background: rgba(255,70,70,.03);
    }

    .card-title{
      font-size:15px;
      font-weight:700;
      color:var(--cyan);
      text-shadow:0 0 10px rgba(0,234,255,.35);
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .badges{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      justify-content:flex-end;
    }

    .badge{
      border:1px solid var(--line);
      color:var(--muted);
      background:rgba(0,255,255,.03);
      padding:4px 8px;
      border-radius:999px;
      font-size:11px;
      white-space:nowrap;
      transition: border-color .35s ease, background .35s ease;
    }

    body.security-alert .badge{
      border-color: rgba(255,70,70,.25);
      background: rgba(255,70,70,.03);
    }

    .progress{
      height:3px;
      background:linear-gradient(90deg, transparent, var(--cyan), transparent);
      background-size:180px 100%;
      animation:loadBar 1.6s linear infinite;
    }

    @keyframes loadBar{
      from{ background-position:-180px 0; }
      to{ background-position:180px 0; }
    }

    .card-body{
      padding:16px;
      line-height:2;
      color:var(--text);
      white-space:pre-wrap;
      word-break:break-word;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      padding:14px;
      border-top:1px dashed rgba(0,234,255,.16);
      background:rgba(0,255,255,.02);
      transition: border-color .35s ease, background .35s ease;
    }

    body.security-alert .actions{
      border-top-color: rgba(255,70,70,.16);
      background: rgba(255,70,70,.02);
    }

    .btn{
      appearance:none;
      border:1px solid var(--line);
      background:#000;
      color:var(--cyan);
      padding:9px 12px;
      border-radius:12px;
      cursor:pointer;
      font-size:14px;
      transition:.16s ease;
      box-shadow:0 0 10px rgba(0,234,255,.04);
    }

    .btn:hover{
      background:var(--cyan);
      color:#001015;
      transform:translateY(-1px);
    }

    .btn.stop{
      border-color:rgba(255,77,77,.35);
      color:#ffb1b1;
    }

    .btn.stop:hover{
      background:var(--danger);
      color:#fff;
    }

    body.security-alert .btn{
      border-color: rgba(255,70,70,.3);
      color:#ffb1b1;
    }

    body.security-alert .btn:hover{
      background:#ff4d4d;
      color:#fff;
    }

    .inputbar{
      min-height:var(--inputbar-h);
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(0,255,255,.07), rgba(0,0,0,.25));
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow), inset 0 0 20px rgba(0,234,255,.05);
      transition: background .35s ease;
    }

    body.security-alert .inputbar{
      background:linear-gradient(180deg, rgba(255,70,70,.07), rgba(0,0,0,.25));
    }

    .icon{
      flex:0 0 46px;
      width:46px;
      height:46px;
      border-radius:50%;
      display:grid;
      place-items:center;
      cursor:pointer;
      border:1px solid var(--line);
      background:#000;
      color:var(--cyan);
      font-size:18px;
      transition:.16s ease;
    }

    .icon:hover{
      background:var(--cyan);
      color:#001015;
      transform:translateY(-1px);
    }

    body.security-alert .icon{
      border-color: rgba(255,70,70,.3);
      color:#ffb1b1;
    }

    body.security-alert .icon:hover{
      background:#ff4d4d;
      color:#fff;
    }

    .inputbar input{
      flex:1 1 auto;
      min-width:0;
      height:48px;
      padding:0 14px;
      border-radius:12px;
      border:1px solid var(--line);
      outline:none;
      background:#000;
      color:var(--text);
      font-size:16px;
      caret-color:var(--cyan);
    }

    .inputbar input::placeholder{
      color:#7fbcc4;
    }

    body.security-alert .inputbar input{
      border-color: rgba(255,70,70,.3);
      caret-color: #ff7d7d;
    }

    body.security-alert .inputbar input::placeholder{
      color:#ffb8b8;
    }

    .toast{
      position:fixed;
      bottom:110px;
      left:50%;
      transform:translateX(-50%);
      z-index:30;
      padding:10px 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.84);
      color:var(--cyan);
      box-shadow:var(--shadow);
      font-size:14px;
      opacity:0;
      pointer-events:none;
      transition:opacity .25s ease, transform .25s ease;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(-6px);
    }

    #securityModal{
      position:fixed;
      inset:0;
      z-index:9999;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:rgba(0,0,0,.74);
      backdrop-filter:blur(5px);
    }

    #securityModal.show{
      display:flex;
      animation: modalFade .22s ease;
    }

    @keyframes modalFade{
      from{ opacity:0; }
      to{ opacity:1; }
    }

    .security-box{
      width:min(92vw, 460px);
      border-radius:20px;
      border:1px solid rgba(255,100,100,.42);
      background:
        linear-gradient(180deg, rgba(90,0,0,.95), rgba(35,0,0,.95));
      box-shadow:
        0 0 30px rgba(255,50,50,.22),
        inset 0 0 24px rgba(255,120,120,.08);
      overflow:hidden;
      transform:scale(.96);
      animation: modalPop .26s ease forwards;
    }

    @keyframes modalPop{
      to{ transform:scale(1); }
    }

    .security-head{
      padding:16px 18px;
      border-bottom:1px solid rgba(255,120,120,.18);
      color:#ffd2d2;
      font-size:20px;
      font-weight:700;
      text-align:center;
      text-shadow:0 0 12px rgba(255,90,90,.32);
    }

    .security-body{
      padding:18px;
      color:#ffe9e9;
      line-height:2;
      text-align:center;
      font-size:15px;
      background: linear-gradient(180deg, rgba(255,80,80,.03), rgba(0,0,0,.08));
    }

    .security-body .accent{
      color:#ffaaaa;
      font-weight:700;
    }

    .security-actions{
      display:flex;
      justify-content:center;
      padding:0 18px 18px;
    }

    .security-ok{
      min-width:140px;
      appearance:none;
      border:none;
      border-radius:12px;
      padding:12px 18px;
      cursor:pointer;
      font-size:15px;
      font-weight:700;
      color:#fff;
      background:linear-gradient(180deg, #ff5252, #c11f1f);
      box-shadow:0 0 18px rgba(255,60,60,.22);
      transition:transform .16s ease, filter .16s ease;
    }

    .security-ok:hover{
      transform:translateY(-1px);
      filter:brightness(1.08);
    }

    @media (max-width: 860px){
      .hero{
        flex-basis:185px;
      }
      .core-cluster{
        transform:scale(.92);
      }
      .card-title{
        font-size:14px;
      }
      .actions{
        gap:8px;
      }
      .btn{
        font-size:13px;
        padding:8px 10px;
      }
    }

    @media (max-width: 640px){
      :root{
        --topbar-h:76px;
        --inputbar-h:84px;
      }

      .app{
        padding:8px;
        gap:8px;
      }

      .topbar{
        padding:10px 12px;
      }

      .brand-text h1{
        font-size:15px;
      }

      .brand-text .sub{
        font-size:11px;
      }

      .sys{
        gap:8px;
        font-size:11px;
      }

      .status-pill{
        max-width:160px;
      }

      .hero{
        flex-basis:165px;
      }

      .core-cluster{
        transform:scale(.82);
      }

      .chat{
        padding:14px 12px 22px;
      }

      .bubble{
        max-width:100%;
        font-size:14px;
      }

      .card{
        width:100%;
      }

      .card-head{
        align-items:flex-start;
        flex-direction:column;
      }

      .badges{
        justify-content:flex-start;
      }

      .card-body{
        font-size:14px;
        line-height:1.95;
        padding:14px;
      }

      .actions{
        padding:12px;
      }

      .btn{
        flex:1 1 calc(50% - 8px);
        text-align:center;
      }

      .inputbar{
        padding:10px;
      }

      .icon{
        width:44px;
        height:44px;
        flex-basis:44px;
      }

      .inputbar input{
        font-size:15px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="scan"></div>
  <div class="noise"></div>

  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div class="brand-text">
          <h1>KeFo AI — FUTURE HUD</h1>
          <div class="sub">Adaptive Wikipedia Intelligence for Students</div>
        </div>
      </div>

      <div class="sys">
        <div class="status-pill"><span>CORE ONLINE</span><span class="dot"></span></div>
        <div class="status-pill" id="voiceInfo">VOICE: AUTO</div>
        <div class="status-pill" id="langInfo">LANG: AUTO</div>
      </div>
    </div>

    <div class="main">
      <div class="hero">
        <div class="core-cluster">
          <div class="ring r1"></div>
          <div class="ring r2"></div>
          <div class="ring r3"></div>
          <div class="core" id="core"></div>
        </div>
        <div class="hero-label">Knowledge Core / Neural Reading Interface</div>
      </div>

      <div class="chat" id="chat"></div>
    </div>

    <div class="inputbar">
      <div class="icon" id="voiceBtn" title="إدخال صوتي">🎤</div>
      <input id="input" type="text" placeholder="اكتب سؤالك… مثال: حلب / Berlin / künstliche Intelligenz" />
      <div class="icon" id="sendBtn" title="إرسال">➤</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div id="securityModal">
    <div class="security-box">
      <div class="security-head">⚠️ تنبيه أمني</div>
      <div class="security-body">
        <span class="accent">المنصة محمية</span>، شكرًا لتفهمكم.<br>
        والآن لنعد إلى البحث والتعلّم.
      </div>
      <div class="security-actions">
        <button class="security-ok" id="securityOkBtn">موافق</button>
      </div>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const core = document.getElementById('core');
    const sendBtn = document.getElementById('sendBtn');
    const voiceBtn = document.getElementById('voiceBtn');
    const toast = document.getElementById('toast');
    const voiceInfo = document.getElementById('voiceInfo');
    const langInfo = document.getElementById('langInfo');
    const securityModal = document.getElementById('securityModal');
    const securityOkBtn = document.getElementById('securityOkBtn');

    let voices = [];
    let bestArabicVoice = null;
    let currentUtterance = null;
    let currentReadButton = null;
    let userInteractedForAudio = false;
    let speaking = false;
    let securityLock = false;
    let longPressTimer = null;

    function showToast(message){
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => {
        toast.classList.remove('show');
      }, 1800);
    }

    function scrollChatToBottom(){
      requestAnimationFrame(() => {
        chat.scrollTop = chat.scrollHeight;
      });
    }

    function scrollElementIntoView(el){
      requestAnimationFrame(() => {
        el.scrollIntoView({ behavior:'smooth', block:'end' });
      });
    }

    function addBubble(text, cls = 'ai'){
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + cls;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      wrap.appendChild(bubble);
      chat.appendChild(wrap);
      scrollChatToBottom();
      return wrap;
    }

    function enableAudioByGesture(){
      if(!userInteractedForAudio){
        userInteractedForAudio = true;
      }
    }

    document.body.addEventListener('click', enableAudioByGesture, { passive:true });
    document.body.addEventListener('touchstart', enableAudioByGesture, { passive:true });

    function stopSpeaking(updateButton = true){
      window.speechSynthesis.cancel();
      currentUtterance = null;
      speaking = false;
      core.classList.remove('speaking');

      if(updateButton && currentReadButton){
        currentReadButton.textContent = '🔊 قراءة صوتية';
        currentReadButton.classList.remove('stop');
        currentReadButton = null;
      }
    }

    function rankArabicVoice(voice){
      const name = (voice.name || '').toLowerCase();
      const lang = (voice.lang || '').toLowerCase();

      let score = 0;
      if(lang.startsWith('ar')) score += 100;
      if(name.includes('google')) score += 40;
      if(name.includes('microsoft')) score += 35;
      if(name.includes('natural')) score += 25;
      if(name.includes('desktop')) score += 10;
      if(name.includes('hoda')) score += 8;
      if(name.includes('naayf')) score += 8;
      if(name.includes('tarik')) score += 8;
      if(name.includes('majid')) score += 8;
      if(name.includes('maged')) score += 8;
      if(name.includes('female')) score += 5;
      if(name.includes('male')) score += 4;
      if(voice.localService) score += 3;

      return score;
    }

    function loadVoices(){
      voices = window.speechSynthesis.getVoices() || [];
      const arabicVoices = voices.filter(v => (v.lang || '').toLowerCase().startsWith('ar'));

      if(arabicVoices.length){
        arabicVoices.sort((a, b) => rankArabicVoice(b) - rankArabicVoice(a));
        bestArabicVoice = arabicVoices[0];
        voiceInfo.textContent = 'VOICE: ' + bestArabicVoice.name;
      } else {
        bestArabicVoice = null;
        voiceInfo.textContent = 'VOICE: DEFAULT';
      }
    }

    loadVoices();
    if(typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined){
      speechSynthesis.onvoiceschanged = loadVoices;
    }

    function splitTextForSpeech(text, maxLength = 180){
      const clean = String(text || '').replace(/\s+/g, ' ').trim();
      if(!clean) return [];

      const sentences = clean.match(/[^.!؟\n]+[.!؟\n]?/g) || [clean];
      const chunks = [];
      let current = '';

      for(const sentenceRaw of sentences){
        const sentence = sentenceRaw.trim();
        if(!sentence) continue;

        if((current + ' ' + sentence).trim().length <= maxLength){
          current = (current + ' ' + sentence).trim();
        } else {
          if(current) chunks.push(current);

          if(sentence.length <= maxLength){
            current = sentence;
          } else {
            const words = sentence.split(' ');
            let part = '';
            for(const word of words){
              if((part + ' ' + word).trim().length <= maxLength){
                part = (part + ' ' + word).trim();
              } else {
                if(part) chunks.push(part);
                part = word;
              }
            }
            current = part;
          }
        }
      }

      if(current) chunks.push(current);
      return chunks;
    }

    function speakLong(text, button = null){
      if(!userInteractedForAudio){
        showToast('المتصفح يتطلب لمسة أولاً لتفعيل الصوت');
        return;
      }

      stopSpeaking(false);

      const chunks = splitTextForSpeech(text, 180);
      if(!chunks.length) return;

      let index = 0;
      speaking = true;
      currentReadButton = button;

      if(currentReadButton){
        currentReadButton.textContent = '⏹ إيقاف القراءة';
        currentReadButton.classList.add('stop');
      }

      function speakNext(){
        if(!speaking || index >= chunks.length){
          speaking = false;
          core.classList.remove('speaking');
          if(currentReadButton){
            currentReadButton.textContent = '🔊 قراءة صوتية';
            currentReadButton.classList.remove('stop');
          }
          currentUtterance = null;
          currentReadButton = null;
          return;
        }

        const utter = new SpeechSynthesisUtterance(chunks[index]);
        utter.lang = bestArabicVoice?.lang || 'ar-SA';
        utter.rate = 0.95;
        utter.pitch = 1;
        utter.volume = 1;

        if(bestArabicVoice){
          utter.voice = bestArabicVoice;
        }

        currentUtterance = utter;

        utter.onstart = () => {
          core.classList.add('speaking');
        };

        utter.onend = () => {
          index++;
          speakNext();
        };

        utter.onerror = () => {
          speaking = false;
          core.classList.remove('speaking');
          if(currentReadButton){
            currentReadButton.textContent = '🔊 قراءة صوتية';
            currentReadButton.classList.remove('stop');
          }
          currentUtterance = null;
          currentReadButton = null;
        };

        window.speechSynthesis.speak(utter);
      }

      speakNext();
    }

    function detectInputLanguage(text){
      const value = String(text || '').trim();

      if(/[ء-ي]/.test(value)) return 'ar';
      if(/[äöüßÄÖÜ]/.test(value)) return 'de';
      return 'en';
    }

    function summarizeLocal(text){
      const parts = text
        .split(/[.؟!\n]/)
        .map(s => s.trim())
        .filter(Boolean);

      if(!parts.length) return text;
      return parts.slice(0, 4).join('.\n') + (parts.length > 4 ? '\n…' : '');
    }

    function quizFromText(text){
      const parts = text
        .split(/[.؟!\n]/)
        .map(s => s.trim())
        .filter(Boolean);

      const chosen = parts[Math.floor(Math.random() * Math.min(parts.length, 5))] || 'اشرح الفكرة الأساسية للنص بطريقتك.';
      return `🧪 سؤال للمراجعة:\n${chosen}\n\nحاول أن تكتب الجواب بطريقتك الخاصة.`;
    }

    function createActionButton(label, onClick){
      const btn = document.createElement('button');
      btn.className = 'btn';
      btn.textContent = label;
      btn.addEventListener('click', onClick);
      return btn;
    }

    function renderCard(title, text, sourceLang){
      const card = document.createElement('div');
      card.className = 'card';

      const head = document.createElement('div');
      head.className = 'card-head';

      const titleDiv = document.createElement('div');
      titleDiv.className = 'card-title';
      titleDiv.textContent = '📄 ' + (title || 'نتيجة ويكيبيديا');

      const badges = document.createElement('div');
      badges.className = 'badges';
      badges.innerHTML = `
        <span class="badge">AI READY</span>
        <span class="badge">STUDENT</span>
        <span class="badge">WIKIPEDIA ${String(sourceLang || '').toUpperCase()}</span>
      `;

      head.appendChild(titleDiv);
      head.appendChild(badges);

      const progress = document.createElement('div');
      progress.className = 'progress';

      const body = document.createElement('div');
      body.className = 'card-body';
      body.textContent = text;

      const actions = document.createElement('div');
      actions.className = 'actions';

      const copyBtn = createActionButton('📋 نسخ النص', () => {
        navigator.clipboard.writeText(body.textContent);
        showToast('تم النسخ');
      });

      const readBtn = createActionButton('🔊 قراءة صوتية', () => {
        if(currentReadButton === readBtn && speaking){
          stopSpeaking(true);
          return;
        }
        speakLong(body.textContent, readBtn);
      });

      const saveBtn = createActionButton('⭐ حفظ', () => {
        const notes = JSON.parse(localStorage.getItem('kefo_notes') || '[]');
        notes.push({
          title,
          text,
          date: Date.now(),
          lang: sourceLang
        });
        localStorage.setItem('kefo_notes', JSON.stringify(notes));
        showToast('تم الحفظ');
      });

      const summaryBtn = createActionButton('✂️ ملخص سريع', () => {
        body.textContent = summarizeLocal(text);
        scrollElementIntoView(card);
      });

      const fullBtn = createActionButton('📘 النص الكامل', () => {
        body.textContent = text;
        scrollElementIntoView(card);
      });

      const quizBtn = createActionButton('🧪 اختبرني', () => {
        alert(quizFromText(body.textContent));
      });

      actions.appendChild(copyBtn);
      actions.appendChild(readBtn);
      actions.appendChild(saveBtn);
      actions.appendChild(summaryBtn);
      actions.appendChild(fullBtn);
      actions.appendChild(quizBtn);

      card.appendChild(head);
      card.appendChild(progress);
      card.appendChild(body);
      card.appendChild(actions);

      chat.appendChild(card);
      scrollElementIntoView(card);

      setTimeout(() => {
        progress.remove();
        scrollElementIntoView(card);
      }, 850);

      return card;
    }

    async function ask(){
      stopSpeaking(true);

      const q = input.value.trim();
      if(!q) return;

      const lang = detectInputLanguage(q);
      langInfo.textContent = 'LANG: ' + lang.toUpperCase();

      addBubble(q, 'user');
      input.value = '';

      core.classList.add('thinking');
      addBubble('🤖 أفكر… جاري تحليل المعرفة.');

      const url = `https://${lang}.wikipedia.org/w/api.php?action=query&format=json&prop=extracts&explaintext&titles=${encodeURIComponent(q)}&origin=*`;

      try{
        const res = await fetch(url);
        const data = await res.json();
        const page = Object.values(data.query.pages)[0];

        const text = page && page.extract ? page.extract : (
          lang === 'ar' ? 'لم أجد معلومات عن هذا الموضوع.' :
          lang === 'de' ? 'Keine Informationen zu diesem Thema gefunden.' :
          'No information found about this topic.'
        );

        const title = page && page.title ? page.title : q;

        core.classList.remove('thinking');
        const card = renderCard(title, text, lang);
        scrollElementIntoView(card);
      } catch(error){
        core.classList.remove('thinking');
        addBubble('❌ حدث خطأ أثناء جلب المعلومات.', 'ai');
      }
    }

    sendBtn.addEventListener('click', ask);

    input.addEventListener('keydown', (e) => {
      if(e.key === 'Enter') ask();
    });

    voiceBtn.addEventListener('click', () => {
      stopSpeaking(true);

      const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if(!Recognition){
        showToast('الإدخال الصوتي غير مدعوم هنا');
        return;
      }

      const rec = new Recognition();
      rec.lang = 'ar-SA';
      rec.interimResults = false;
      rec.maxAlternatives = 1;

      rec.onstart = () => {
        showToast('تحدث الآن...');
      };

      rec.onresult = (e) => {
        input.value = e.results[0][0].transcript;
        ask();
      };

      rec.onerror = () => {
        showToast('تعذر التقاط الصوت');
      };

      rec.start();
    });

    function closeSecurityModal(){
      securityModal.classList.remove('show');
    }

    securityOkBtn.addEventListener('click', closeSecurityModal);

    function triggerSecurityAlert(reason = ''){
      if(securityLock) return;
      securityLock = true;

      document.body.classList.add('security-alert');
      securityModal.classList.add('show');

      console.log('Security alert:', reason);

      setTimeout(() => {
        document.body.classList.remove('security-alert');
        securityLock = false;
      }, 3800);
    }

    document.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      triggerSecurityAlert('right-click');
    });

    document.addEventListener('selectstart', (e) => {
      e.preventDefault();
      triggerSecurityAlert('selectstart');
    });

    document.addEventListener('copy', (e) => {
      e.preventDefault();
      triggerSecurityAlert('copy');
    });

    document.addEventListener('cut', (e) => {
      e.preventDefault();
      triggerSecurityAlert('cut');
    });

    document.addEventListener('dragstart', (e) => {
      e.preventDefault();
      triggerSecurityAlert('dragstart');
    });

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (
        key === 'f12' ||
        (e.ctrlKey && e.shiftKey && ['i', 'j', 'c', 'k'].includes(key)) ||
        (e.ctrlKey && ['u', 's', 'a', 'c', 'x'].includes(key))
      ) {
        e.preventDefault();
        e.stopPropagation();
        triggerSecurityAlert('devtools/shortcut');
      }
    }, true);

    document.addEventListener('mousedown', (e) => {
      if(e.button === 2){
        e.preventDefault();
        triggerSecurityAlert('mouse-right');
      }
    });

    if (duration > 600 && duration < 2000 && !touchMoved)

    document.addEventListener('touchend', () => {
      clearTimeout(longPressTimer);
    }, { passive:true });

    document.addEventListener('touchmove', () => {
      clearTimeout(longPressTimer);
    }, { passive:true });

    setInterval(() => {
      const widthGap = window.outerWidth - window.innerWidth;
      const heightGap = window.outerHeight - window.innerHeight;

      if(widthGap > 160 || heightGap > 160){
        triggerSecurityAlert('devtools-detection');
      }
    }, 1800);

    addBubble('مرحبًا 👋 اكتب أي موضوع بالعربية أو الإنجليزية أو الألمانية، وسأجلب لك النتيجة باللغة المناسبة.', 'ai');
  </script>
</body>
</html>
